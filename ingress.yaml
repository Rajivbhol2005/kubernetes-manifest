apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rajiv-app-ingress
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  rules:
  - host: rajivbhol.in
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rajiv-app-service
            port:
              number: 80
